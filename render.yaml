services:
  - type: web
    name: event-payment-registration
    env: docker
    plan: starter
    autoDeploy: true
    healthCheckPath: /api/health
    disk:
      name: event-payment-data
      mountPath: /app/data
      sizeGB: 1
    envVars:
      - key: PORT
        value: 8080
      - key: PUBLIC_BASE_URL
        sync: false
      - key: PAYOS_CLIENT_ID
        sync: false
      - key: PAYOS_API_KEY
        sync: false
      - key: PAYOS_CHECKSUM_KEY
        sync: false
