services:
  - type: web
    name: event-payment-registration
    env: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 8080
      - key: PUBLIC_BASE_URL
        sync: false
      - key: PAYOS_CLIENT_ID
        sync: false
      - key: PAYOS_API_KEY
        sync: false
      - key: PAYOS_CHECKSUM_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: EMAIL_API_URL
        sync: false
      - key: EMAIL_API_KEY
        sync: false
      - key: EMAIL_API_AUTH_HEADER
        value: Authorization
      - key: EMAIL_API_AUTH_SCHEME
        value: Bearer
      - key: EMAIL_API_FROM
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_SECURE
        value: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        sync: false
